name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # ESLint 规则与历史代码尚未完全对齐；本地可运行 pnpm lint 逐步收紧。
      - name: Unit tests
        run: pnpm test

      - name: Build web
        run: pnpm -F @tg/web build

      - name: Worker bundle (dry-run)
        working-directory: apps/signaling-cf
        run: npx wrangler deploy --dry-run
