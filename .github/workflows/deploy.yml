name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main        # 生产部署
      - master      # 预览部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      # Vite production build only reads apps/web/.env.production (not .env.development).
      # If Cloudflare Pages "Environment variables" defines VITE_SIGNALING_URL as empty,
      # it overrides .env files and the client will have no signaling URL on non-localhost.
      - name: Build web
        run: pnpm -F @tg/web build

      - name: Verify signaling URL is embedded in bundle
        run: |
          set -e
          line=$(grep -E '^VITE_SIGNALING_URL=' apps/web/.env.production | tail -1)
          host=${line#VITE_SIGNALING_URL=}
          host=${host#wss://}
          host=${host#ws://}
          host=${host%%/*}
          if [ -z "$host" ]; then
            echo '::error::apps/web/.env.production missing VITE_SIGNALING_URL'
            exit 1
          fi
          if ! grep -rF "$host" apps/web/dist --include='*.js' -q; then
            echo "::error::Bundle missing signaling host \"$host\" — empty VITE_SIGNALING_URL in CI/Pages env overrides .env; or .env.production not applied (build cwd must be apps/web)."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=trusted-games-platform --branch=${{ github.ref_name }}
